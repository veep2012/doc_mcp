repos:
  - repo: local
    hooks:
      - id: documentation-changelog-duplication
        name: documentation changelog duplication
        entry: python3 scripts/check_documentation_changelog_duplicates.py
        language: system
        pass_filenames: false

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: ["--line-length=100"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
